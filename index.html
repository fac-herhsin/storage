<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倉庫儲位管理系統 - 完整功能版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary-color: #007bff; --shelf-color: #e9ecef; --hover-color: #ffe082; }
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        
        .main-layout { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 1000px; margin: 0 auto; }
        
        /* 搜尋區塊 - 固定在上方 */
        .search-container { 
            background: white; padding: 20px; border-radius: 8px; 
            margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: flex; gap: 15px; align-items: center;
            position: sticky; top: 10px; z-index: 100;
        }
        #global-search { flex: 1; padding: 12px; border: 2px solid var(--primary-color); border-radius: 6px; font-size: 18px; }

        #map-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* SVG 樣式 */
        .shelf { fill: var(--shelf-color); stroke: #adb5bd; stroke-width: 1.5; cursor: pointer; transition: 0.2s; }
        .shelf:hover { fill: var(--hover-color); transform: translateY(-2px); }
        .shelf-text { font-size: 14px; font-weight: bold; pointer-events: none; fill: #495057; }
        .door-arc { fill: none; stroke: #d32f2f; stroke-width: 2; stroke-dasharray: 4; }
        .door-frame { fill: none; stroke: #d32f2f; stroke-width: 3; }

        /* 彈窗樣式 */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { 
            background: white; margin: 1% auto; width: 95%; max-width: 850px; height: 95vh;
            border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; 
        }
        .modal-header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }

        /* 實景導覽區 */
        .photo-guide-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto 20px; border: 3px solid #333; border-radius: 8px; overflow: hidden; }
        .shelf-photo { width: 100%; display: block; }
        .guide-box { position: absolute; border: 4px solid red; background: rgba(255, 0, 0, 0.2); display: none; pointer-events: none; box-shadow: 0 0 15px rgba(255,0,0,0.5); }

        /* 搜尋結果區塊 */
        #search-results-panel { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid var(--primary-color); min-height: 100px; }
        #search-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 10px; }
        .search-item-card { border: 1px solid #eee; padding: 10px; border-radius: 6px; cursor: pointer; background: #fdfdfd; }
        .search-item-card:hover { background: #f0f7ff; border-color: var(--primary-color); }

        /* 按鈕與零件卡片 */
        .level-btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; background: white; padding: 10px; position: sticky; top: 0; z-index: 10; }
        .level-btn { padding: 10px 15px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; background: #f8f9fa; }
        .level-btn.active { background: var(--primary-color); color: white; }
        .item-card { border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; gap: 15px; background: #fff; }
        .item-image { width: 100px; height: 100px; object-fit: cover; border-radius: 6px; }
        .close-btn { font-size: 30px; cursor: pointer; color: #999; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="search-container">
        <strong>🔍 零件搜尋：</strong>
        <input type="text" id="global-search" placeholder="輸入名稱、用途或編號 (如: F6-1)..." oninput="handleSearch()">
    </div>

    <div id="map-container">
        <h2 style="text-align:center; margin-top:0;">倉庫儲位平面圖</h2>
        <svg id="warehouse-map" viewBox="0 0 450 650" width="100%">
            <rect x="10" y="10" width="430" height="630" fill="none" stroke="#333" stroke-width="2" />
            
            <line x1="440" y1="110" x2="440" y2="180" class="door-frame" />
            <path d="M 440 110 Q 380 110 380 110" stroke="#d32f2f" stroke-width="2" fill="none" />
            <path d="M 380 110 A 60 60 0 0 1 440 170" class="door-arc" />
            <text x="395" y="150" fill="#d32f2f" font-weight="bold">門</text>

            <rect id="F1" class="shelf" x="320" y="10" width="120" height="90" /><text x="380" y="55" class="shelf-text" text-anchor="middle">F1</text>
            <rect id="F2" class="shelf" x="115" y="10" width="195" height="110" /><text x="212.5" y="65" class="shelf-text" text-anchor="middle">F2</text>
            <rect id="F3" class="shelf" x="10" y="10" width="95" height="250" /><text x="57.5" y="135" class="shelf-text" text-anchor="middle">F3</text>
            <rect id="F4" class="shelf" x="130" y="160" width="100" height="30" /><text x="180" y="180" class="shelf-text" text-anchor="middle">F4</text>
            <rect id="F5" class="shelf" x="130" y="190" width="100" height="30" /><text x="180" y="210" class="shelf-text" text-anchor="middle">F5</text>
            <rect id="F6" class="shelf" x="130" y="245" width="100" height="30" /><text x="180" y="265" class="shelf-text" text-anchor="middle">F6</text>
            <rect id="F7" class="shelf" x="130" y="275" width="100" height="30" /><text x="180" y="295" class="shelf-text" text-anchor="middle">F7</text>
            <rect id="F8" class="shelf" x="130" y="340" width="100" height="30" /><text x="180" y="360" class="shelf-text" text-anchor="middle">F8</text>
            <rect id="F9" class="shelf" x="270" y="240" width="40" height="110" /><text x="290" y="300" class="shelf-text" text-anchor="middle">F9</text>
            <rect id="F10" class="shelf" x="310" y="240" width="40" height="110" /><text x="330" y="300" class="shelf-text" text-anchor="middle">F10</text>
        </svg>  
    </div>

    <div id="search-results-panel">
        <h3 style="margin:0;">📋 搜尋結果</h3>
        <div id="search-list">請輸入關鍵字搜尋...</div>
    </div>
</div>

<div id="shelfModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title">櫃位詳情</h2>
            <span class="close-btn" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body">
            <div id="shelf-photo-area" class="photo-guide-container" style="display:none;">
                <img src="" id="shelf-image" class="shelf-photo">
                <div id="guide-box" class="guide-box"></div>
            </div>
            <div id="modal-level-buttons" class="level-btn-group"></div>
            <div id="modal-item-display"></div>
        </div>
    </div>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSto46FBwnjrl-C05u7L8klqGX0NaF33RrBVoXQutZv0EeC8uKvlcqh2UrhVdVJpQMnKtkTQnS6x591/pub?gid=0&single=true&output=csv";
    let inventoryData = [];

    // F6 實景配置
    const SHELF_CONFIG = {
        "F6": {
            img: "F6.jpg", 
            coords: {
                "F6-1": { top: "5%", left: "2%", width: "96%", height: "22%" },
                "F6-2": { top: "28%", left: "2%", width: "96%", height: "22%" },
                "F6-3": { top: "52%", left: "2%", width: "96%", height: "22%" },
                "F6-4": { top: "75%", left: "2%", width: "96%", height: "22%" }
            }
        }
    };

    window.onload = function() {
        Papa.parse(sheetUrl, { download: true, header: true, complete: res => { inventoryData = res.data; } });
    };

    // 搜尋邏輯
    function handleSearch() {
        const kw = document.getElementById("global-search").value.toLowerCase();
        const list = document.getElementById("search-list");
        if(!kw) { list.innerHTML = "請輸入關鍵字搜尋..."; return; }

        const res = inventoryData.filter(item => 
            (item["零件名稱 (Name)"] && item["零件名稱 (Name)"].toLowerCase().includes(kw)) ||
            (item["層級編號 (Level)"] && item["層級編號 (Level)"].toLowerCase().includes(kw))
        );

        list.innerHTML = res.length ? res.map(item => `
            <div class="search-item-card" onclick="quickView('${item["層級編號 (Level)"]}')">
                <strong>${item["零件名稱 (Name)"]}</strong><br>
                <small>位置：${item["層級編號 (Level)"]}</small>
            </div>
        `).join('') : "找不到相關零件";
    }

    function quickView(levelId) {
        const shelfId = levelId.split('-')[0];
        openModal(shelfId);
        setTimeout(() => {
            const btns = document.querySelectorAll('.level-btn');
            btns.forEach(b => { if(b.innerText === levelId) b.click(); });
        }, 200);
    }

    document.querySelectorAll('.shelf').forEach(s => s.addEventListener('click', () => openModal(s.id)));

    function openModal(shelfId) {
        document.getElementById("modal-title").innerText = "櫃位詳情：" + shelfId;
        const photoArea = document.getElementById("shelf-photo-area");
        const guideBox = document.getElementById("guide-box");
        const btnContainer = document.getElementById("modal-level-buttons");
        
        if (SHELF_CONFIG[shelfId]) {
            photoArea.style.display = "block";
            document.getElementById("shelf-image").src = SHELF_CONFIG[shelfId].img;
        } else {
            photoArea.style.display = "none";
        }

        guideBox.style.display = "none";
        btnContainer.innerHTML = "";
        
        for(let i = 1; i <= 4; i++) {
            let levelId = `${shelfId}-${i}`;
            let btn = document.createElement('button');
            btn.className = "level-btn";
            btn.innerText = levelId;
            btn.onclick = function() {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                if (SHELF_CONFIG[shelfId] && SHELF_CONFIG[shelfId].coords[levelId]) {
                    const c = SHELF_CONFIG[shelfId].coords[levelId];
                    Object.assign(guideBox.style, { top: c.top, left: c.left, width: c.width, height: c.height, display: "block" });
                }
                renderItems(levelId);
            };
            btnContainer.appendChild(btn);
        }
        document.getElementById("shelfModal").style.display = "block";
    }

    function renderItems(levelId) {
        const matched = inventoryData.filter(item => item["層級編號 (Level)"] === levelId);
        const container = document.getElementById("modal-item-display");
        container.innerHTML = matched.length ? matched.map(item => `
            <div class="item-card">
                <img src="${item["圖片連結 (ImageURL)"] || ''}" class="item-image" onerror="this.src='https://via.placeholder.com/100?text=無圖片'">
                <div>
                    <h3 style="margin:0;">${item["零件名稱 (Name)"]}</h3>
                    <p>用途：${item["使用用途 (Usage)"] || '無'}</p>
                </div>
            </div>
        `).join('') : "暫無資料";
    }

    function closeModal() { document.getElementById("shelfModal").style.display = "none"; }
</script>
</body>
</html>
