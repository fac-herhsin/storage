<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>倉庫櫃位管理系統</title>
    <style>
        .container { display: flex; gap: 20px; padding: 20px; }
        #map-container { flex: 1; border: 1px solid #ccc; padding: 10px; }
        #info-panel { flex: 1; border: 1px solid #007bff; padding: 20px; background: #f9f9f9; }
        /* 模擬 SVG 櫃位樣式 */
        .shelf { fill: #e0e0e0; stroke: #333; cursor: pointer; transition: 0.3s; }
        .shelf:hover { fill: #ffeb3b; }
        .active-shelf { fill: #4caf50 !important; }
        .item-card { border-bottom: 1px solid #ddd; padding: 10px 0; }
        img { max-width: 100px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="map-container">
        <h3>倉庫平面圖 (點擊櫃位)</h3>
        <svg viewBox="0 0 400 600" width="100%">
            <rect id="F1" class="shelf" x="250" y="20" width="120" height="60" />
            <text x="290" y="55">F1</text>
            
            <rect id="F2" class="shelf" x="120" y="20" width="120" height="80" />
            <text x="160" y="65">F2</text>
            
            <rect id="F4" class="shelf" x="100" y="150" width="80" height="40" />
            <text x="130" y="175">F4</text>
            </svg>
    </div>

    <div id="info-panel">
        <h2 id="selected-title">請選擇櫃位</h2>
        <div id="level-buttons"></div>
        <hr>
        <div id="item-details">點擊層級查看零件...</div>
    </div>
</div>

<script>
    // 模擬從 Google Sheets 抓取的資料
    const inventoryData = [
        { shelf: "F1", level: "F1-1", name: "2吋白鐵彎頭", usage: "攪拌機出水口", img: "https://via.placeholder.com/100" },
        { shelf: "F1", level: "F2-1", name: "3吋法蘭", usage: "粉體輸送管", img: "" }
    ];

    const shelves = document.querySelectorAll('.shelf');
    
    shelves.forEach(shelf => {
        shelf.addEventListener('click', function() {
            // 變更顏色選取狀態
            shelves.forEach(s => s.classList.remove('active-shelf'));
            this.classList.add('active-shelf');
            
            const shelfId = this.id;
            showLevels(shelfId);
        });
    });

    function showLevels(shelfId) {
        document.getElementById('selected-title').innerText = "櫃位：" + shelfId;
        const btnContainer = document.getElementById('level-buttons');
        btnContainer.innerHTML = ""; // 清空

        // 這裡假設每一座櫃位固定有 1-4 層，或是從資料過濾
        for(let i=1; i<=4; i++) {
            let levelId = `${shelfId}-${i}`;
            let btn = document.createElement('button');
            btn.innerText = levelId;
            btn.onclick = () => showItems(levelId);
            btnContainer.appendChild(btn);
        }
    }

    function showItems(levelId) {
        const detailContainer = document.getElementById('item-details');
        // 過濾出該層的零件
        const items = inventoryData.filter(d => d.level === levelId);
        
        if(items.length === 0) {
            detailContainer.innerHTML = `目前 ${levelId} 沒有存放零件。`;
            return;
        }

        detailContainer.innerHTML = items.map(item => `
            <div class="item-card">
                <strong>名稱：${item.name}</strong>
                <p>用途：${item.usage}</p>
                ${item.img ? `<img src="${item.img}">` : ''}
            </div>
        `).join('');
    }
</script>
</body>
</html>
